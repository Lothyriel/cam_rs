<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Camera Control</title>
  <style>
    body { margin: 0; padding: 20px; font-family: system-ui, sans-serif; background: #0b1220; color: #e5e7eb; }
    .container { max-width: 980px; margin: 0 auto; display: grid; gap: 16px; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 12px; padding: 14px; }
    .password { color: #22c55e; font-family: ui-monospace, monospace; }
    video { width: 100%; border: 1px solid #334155; border-radius: 8px; background: #000; min-height: 240px; }
    .controls { display: grid; grid-template-columns: repeat(3, minmax(80px, 1fr)); gap: 8px; max-width: 340px; }
    button, select { background: #0b1220; color: #e5e7eb; border: 1px solid #334155; border-radius: 8px; padding: 10px 12px; }
    ul { padding-left: 20px; margin: 8px 0 0; font-family: ui-monospace, monospace; }
    #status { font-family: ui-monospace, monospace; min-height: 1.2em; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card"><h2>Web Password</h2><div class="password" id="pwd"></div></div>
    <div class="card"><h2>RTSP Stream (HLS)</h2><video id="cam" controls autoplay muted playsinline></video><div id="video-status"></div></div>
    <div class="card">
      <h2>ONVIF PTZ Controls</h2>
      <div id="configured-token"></div>
      <div id="active-token"></div>
      <button id="load-profiles">Load ONVIF Profiles</button>
      <select id="profile-select"></select>
      <ul id="profiles"></ul>
      <div class="controls" id="ptz-controls">
        <button data-x="0" data-y="0.6">Up</button>
        <button data-x="0" data-y="0" data-z="0.6">Zoom +</button>
        <button data-stop="1">Stop</button>
        <button data-x="-0.6" data-y="0">Left</button>
        <button data-preset="Home">Go Home</button>
        <button data-x="0.6" data-y="0">Right</button>
        <button data-x="0" data-y="-0.6">Down</button>
        <button data-x="0" data-y="0" data-z="-0.6">Zoom -</button>
      </div>
      <div id="status"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <script>
    const WEB_PASSWORD = __WEB_PASSWORD__;
    const CONFIGURED_PROFILE_TOKEN = __CONFIGURED_PROFILE_TOKEN__;

    const statusEl = document.getElementById('status');
    const videoStatusEl = document.getElementById('video-status');
    const profilesEl = document.getElementById('profiles');
    const configuredTokenEl = document.getElementById('configured-token');
    const activeTokenEl = document.getElementById('active-token');
    const profileSelectEl = document.getElementById('profile-select');

    let selectedProfileToken = CONFIGURED_PROFILE_TOKEN || null;
    document.getElementById('pwd').textContent = WEB_PASSWORD;
    configuredTokenEl.textContent = CONFIGURED_PROFILE_TOKEN
      ? `Configured profile token: ${CONFIGURED_PROFILE_TOKEN}`
      : 'Configured profile token: (not set)';

    function updateActiveTokenLabel() {
      activeTokenEl.textContent = selectedProfileToken
        ? `Active profile token: ${selectedProfileToken}`
        : 'Active profile token: (none)';
    }
    updateActiveTokenLabel();

    const video = document.getElementById('cam');
    const streamUrl = '/hls/stream.m3u8';
    if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = streamUrl;
      videoStatusEl.textContent = 'Using native HLS playback';
    } else if (window.Hls && Hls.isSupported()) {
      const hls = new Hls({ lowLatencyMode: true, liveSyncDurationCount: 2, maxBufferLength: 4 });
      hls.loadSource(streamUrl);
      hls.attachMedia(video);
      videoStatusEl.textContent = 'Using hls.js playback';
    } else {
      videoStatusEl.textContent = 'HLS playback unsupported in this browser';
    }

    async function postJson(url, body) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {})
      });
      const text = await res.text();
      if (!res.ok) throw new Error(text || `HTTP ${res.status}`);
      statusEl.textContent = text || 'OK';
    }

    async function loadProfiles() {
      try {
        profilesEl.innerHTML = '';
        const res = await fetch('/api/onvif/profiles');
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || JSON.stringify(data));

        profileSelectEl.innerHTML = '';
        for (const p of (data.profiles || [])) {
          const opt = document.createElement('option');
          opt.value = p.token;
          opt.textContent = `${p.token} - ${p.name || '(no name)'}`;
          profileSelectEl.appendChild(opt);

          const li = document.createElement('li');
          li.textContent = `${p.token} - ${p.name || '(no name)'}`;
          profilesEl.appendChild(li);
        }

        if (selectedProfileToken) profileSelectEl.value = selectedProfileToken;
        if (!profileSelectEl.value && profileSelectEl.options.length) profileSelectEl.selectedIndex = 0;
        selectedProfileToken = profileSelectEl.value || selectedProfileToken || null;
        updateActiveTokenLabel();
      } catch (err) {
        profilesEl.innerHTML = `<li>Error: ${err.message}</li>`;
      }
    }

    document.getElementById('load-profiles').addEventListener('click', loadProfiles);
    profileSelectEl.addEventListener('change', () => {
      selectedProfileToken = profileSelectEl.value || null;
      updateActiveTokenLabel();
    });
    loadProfiles();

    document.querySelectorAll('#ptz-controls button').forEach(btn => {
      btn.addEventListener('click', async () => {
        try {
          if (btn.dataset.stop) {
            await postJson('/api/onvif/stop', { profile_token: selectedProfileToken });
          } else if (btn.dataset.preset) {
            await postJson('/api/onvif/goto-preset', { preset_token: btn.dataset.preset, profile_token: selectedProfileToken });
          } else {
            await postJson('/api/onvif/move', {
              x: Number(btn.dataset.x || 0),
              y: Number(btn.dataset.y || 0),
              zoom: Number(btn.dataset.z || 0),
              timeout_ms: 500,
              profile_token: selectedProfileToken,
            });
          }
        } catch (err) {
          statusEl.textContent = `Error: ${err.message}`;
        }
      });
    });
  </script>
</body>
</html>
